    function findKnownProduct(query) {
      const q = query.toLowerCase().trim();
      for (const [key, data] of Object.entries(KNOWN_PRODUCTS)) {
        if (q.includes(key) || key.includes(q)) return data;
      }
      return null;

    // ═══════════════════════════════════════════════════
    // UTILITY FUNCTIONS
    // ═══════════════════════════════════════════════════
    // Normalize strain names for better matching
    function normalizeName(s) {
      return s.toLowerCase().trim()
        .replace(/\s+/g, " ")
        .replace(/subsp\.\s*/g, "subsp. ")
        .replace(/ssp\.\s*/g, "subsp. ")
        // Strip strain codes at end (e.g., "Lactobacillus acidophilus NCFM" → "Lactobacillus acidophilus")
        .replace(/\s+(NCFM|DDS-1|La-5|BB-12|GG|HN019|Bi-07|DE111|GBI-30|BC30|299v|R0052|CNCM.*|ATCC.*|DSM.*|UABla.*|UASt.*|NCC\d+|[A-Z]{1,4}-?\d+)$/i, "");
    }

    function matchStrain(name) {
      const q = normalizeName(name);
      // Pass 1: exact match on name or alias
      for (const s of STRAIN_DATABASE) {
        if (normalizeName(s.name) === q) return s;
        for (const a of (s.aliases || [])) { if (normalizeName(a) === q) return s; }
      }
      // Pass 2: input contains db name or db name contains input
      for (const s of STRAIN_DATABASE) {
        const sn = normalizeName(s.name);
        if (sn.includes(q) || q.includes(sn)) return s;
        for (const a of (s.aliases || [])) {
          const an = normalizeName(a);
          if (an.includes(q) || q.includes(an)) return s;
        }
      }
      // Pass 3: match on genus + species (first two words)
      const qWords = q.split(" ").slice(0, 2).join(" ");
      if (qWords.includes(" ")) {
        for (const s of STRAIN_DATABASE) {
          const sWords = normalizeName(s.name).split(" ").slice(0, 2).join(" ");
          if (sWords === qWords) return s;
        }
      }
      return null;
    }

    function classifyStrains(strainData) {
      // strainData can be:
      // - array of strings: ["Lactobacillus acidophilus", ...]
      // - array of objects: [{name: "...", origin: "human", source: "..."}, ...]
      const seen = new Set();
      return strainData.map(item => {
        const name = typeof item === "string" ? item : item.name;
        const apiOrigin = typeof item === "object" ? item.origin : null;
        const apiSource = typeof item === "object" ? item.source : null;
        const apiNotes = typeof item === "object" ? item.notes : null;

        // Try local DB first
        const match = matchStrain(name);
        if (match) {
          if (seen.has(match.name)) return null;
          seen.add(match.name);
          return { inputName: name, ...match, matched: true };
        }

        // Fall back to API-provided classification
        const dedupKey = name.toLowerCase().trim();
        if (seen.has(dedupKey)) return null;
        seen.add(dedupKey);

        if (apiOrigin && ORIGIN_CONFIG[apiOrigin]) {
          return {
            inputName: name, name, origin: apiOrigin,
            source: apiSource || ORIGIN_CONFIG[apiOrigin].tagline,
            notes: apiNotes || "Classification provided by AI analysis.",
            matched: false,
          };
        }

        return { inputName: name, name, origin: "unknown", source: "Unknown", notes: "This strain is not in our database yet.", matched: false };
      }).filter(Boolean);
    }

    // ═══════════════════════════════════════════════════
    // CACHING — saves API results so repeat searches are free & instant
    // ═══════════════════════════════════════════════════
    const CACHE_PREFIX = "hs_cache_";
    const CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

    function getCached(key) {
      try {
        const raw = localStorage.getItem(CACHE_PREFIX + key);
        if (!raw) return null;
        const { data, ts } = JSON.parse(raw);
        if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem(CACHE_PREFIX + key); return null; }
        return data;
      } catch { return null; }
    }

    function setCache(key, data) {
      try { localStorage.setItem(CACHE_PREFIX + key, JSON.stringify({ data, ts: Date.now() })); } catch {}
    }

    function cacheKey(name) { return name.toLowerCase().trim().replace(/[^a-z0-9]/g, "_"); }

    async function callAPI(body) {
      const res = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      const data = await res.json();
      console.log("API response:", JSON.stringify(data).slice(0, 500));
      if (data.error) throw new Error(data.error.message || data.error);
      return data;
    }

    // Strip markdown fences and extract JSON
    function extractJSON(text) {
      let clean = text.replace(/```json\s*/gi, "").replace(/```\s*/g, "");
      const m = clean.match(/\{[\s\S]*\}/);
      if (m) {
        try { return JSON.parse(m[0]); } catch(e) {
          console.warn("JSON incomplete, attempting repair...");
          let repaired = m[0];
          const openBraces = (repaired.match(/\{/g) || []).length;
          const closeBraces = (repaired.match(/\}/g) || []).length;
          const openBrackets = (repaired.match(/\[/g) || []).length;
          const closeBrackets = (repaired.match(/\]/g) || []).length;
          repaired = repaired.replace(/,\s*$/, "").replace(/,\s*\{[^}]*$/, "");
          for (let i = 0; i < openBrackets - closeBrackets; i++) repaired += "]";
          for (let i = 0; i < openBraces - closeBraces; i++) repaired += "}";
          try { return JSON.parse(repaired); } catch(e2) { console.error("Repair failed:", e2); }
        }
      }
      return null;
    }

    async function lookupProduct(productName) {
      // Check browser cache first
      const key = cacheKey(productName);
      const cached = getCached(key);
      if (cached) return cached;

      const data = await callAPI({
        model: "claude-sonnet-4-20250514", max_tokens: 4096,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: `Find the exact probiotic strains/species listed in the supplement facts panel of this product: "${productName}". Also find the total CFU count, number of strains, and the "Other Ingredients" list from the label. For EACH strain, classify its original isolation source as one of: "human" (isolated from human body), "animal" (isolated from animal intestines), "dairy" (from dairy/yogurt/cheese cultures), "soil" (soil/environmental spore-formers), or "plant" (from fermented foods/plants). Return ONLY a raw JSON object with NO markdown fences: {"product_name":"...","brand":"...","cfu":"...","strain_count":number,"strains":[{"name":"full species name","origin":"human|animal|dairy|soil|plant","source":"brief origin description"},...],"strain_designations_listed":true/false,"other_ingredients":"comma-separated list of non-probiotic ingredients","notes":"..."}\nUse full scientific species names. Return ONLY valid JSON, no backticks.` }],
      });

      // Extract text from all content blocks (handles web_search tool_use blocks)
      let text = "";
      if (data.content && Array.isArray(data.content)) {
        for (const block of data.content) {
          if (block.type === "text" && block.text) text += block.text + "\n";
        }
      }
      console.log("Extracted text:", text.slice(0, 500));

      const result = extractJSON(text);
      if (result) {
        if (!Array.isArray(result.strains)) result.strains = [];
        setCache(key, result);
        return result;
      }

      // If model did a web search but hasn't returned JSON yet (stop_reason = "tool_use"),
      // it means the API needs a second turn. For simplicity, retry without web search.
      if (data.stop_reason === "tool_use") {
        console.log("Got tool_use stop, retrying without web search...");
        const retry = await callAPI({
          model: "claude-sonnet-4-20250514", max_tokens: 4096,
          messages: [{ role: "user", content: `List the exact probiotic strains in "${productName}". For each strain, provide origin (human/animal/dairy/soil/plant). Return ONLY JSON, no markdown fences: {"product_name":"...","brand":"...","cfu":"...","strain_count":number,"strains":[{"name":"species","origin":"human|animal|dairy|soil|plant","source":"brief description"},...],"strain_designations_listed":true/false,"notes":"..."}` }],
        });
        let retryText = "";
        if (retry.content && Array.isArray(retry.content)) {
          for (const block of retry.content) { if (block.type === "text" && block.text) retryText += block.text + "\n"; }
        }
        const retryResult = extractJSON(retryText);
        if (retryResult) {
          if (!Array.isArray(retryResult.strains)) retryResult.strains = [];
          setCache(key, retryResult);
          return retryResult;
        }
      }

      throw new Error("Could not parse product data");
    }

    function getGrade(productData, classifiedStrains) {
      const total = classifiedStrains.length;
      const humanCount = classifiedStrains.filter(s => s.origin === "human").length;
      const pct = total > 0 ? (humanCount / total) * 100 : 0;
      let score = pct; // base score from human %

      // Bonuses
      if (productData.strain_designations_listed) score += 10;
      if (productData.isOwnProduct) score += 5;
      if (total <= 3 && total > 0) score += 5; // precision formula bonus

      // Penalties
      if (total >= 10) score -= 10; // kitchen sink
      if (total >= 20) score -= 10; // mega kitchen sink
      if (!productData.strain_designations_listed && !productData.isOwnProduct) score -= 10;
      const redFlags = (productData.ingredient_flags || []).length;
      score -= redFlags * 5;

      if (score >= 95) return { grade: "A+", color: "#7C6FE0", bg: "rgba(124,111,224,0.12)" };
      if (score >= 85) return { grade: "A", color: "#7C6FE0", bg: "rgba(124,111,224,0.1)" };
      if (score >= 75) return { grade: "B+", color: "#55A86B", bg: "rgba(85,168,107,0.1)" };
      if (score >= 65) return { grade: "B", color: "#55A86B", bg: "rgba(85,168,107,0.08)" };
      if (score >= 55) return { grade: "C+", color: "#E0A855", bg: "rgba(224,168,85,0.1)" };
      if (score >= 45) return { grade: "C", color: "#E0A855", bg: "rgba(224,168,85,0.08)" };
      if (score >= 35) return { grade: "D+", color: "#E08855", bg: "rgba(224,136,85,0.1)" };
      if (score >= 25) return { grade: "D", color: "#E08855", bg: "rgba(224,136,85,0.08)" };
      return { grade: "F", color: "#E05555", bg: "rgba(224,85,85,0.1)" };
    }

      }, [query, filter]);
      const filters = [{key:"all",label:"All",emoji:""},{key:"human",label:"Human",emoji:"🧬"},{key:"animal",label:"Animal",emoji:"🐄"},{key:"dairy",label:"Dairy",emoji:"🧀"},{key:"soil",label:"Soil",emoji:"🪨"},{key:"plant",label:"Plant",emoji:"🥬"}];

    function ProductNameAutocomplete({ value, onChange, onSubmit }) {
      const [focused, setFocused] = useState(false);
      const [hl, setHl] = useState(-1);
      const suggestions = useMemo(() => {
        if (!value.trim() || value.length < 2) return [];
        const q = value.toLowerCase();
        return POPULAR_PRODUCTS.filter(p => p.toLowerCase().includes(q)).slice(0, 6);
      }, [value]);
      const show = focused && suggestions.length > 0;
      const select = useCallback(n => { onChange(n); setFocused(false); setHl(-1); }, [onChange]);
      const handleKey = e => {
        if (e.key==="Enter") { if (hl>=0&&show) select(suggestions[hl]); else onSubmit(); }
        else if (e.key==="ArrowDown"&&show) { e.preventDefault(); setHl(i=>Math.min(i+1,suggestions.length-1)); }
        else if (e.key==="ArrowUp"&&show) { e.preventDefault(); setHl(i=>Math.max(i-1,0)); }
        else if (e.key==="Escape") setFocused(false);
      };
      return <div className="autocomplete-row" style={{position:"relative"}}>
        <div style={{flex:1,position:"relative"}}>
          <input type="text" value={value} onChange={e=>{onChange(e.target.value);setHl(-1);}} onKeyDown={handleKey} onFocus={()=>setFocused(true)} onBlur={()=>setTimeout(()=>setFocused(false),150)} placeholder="e.g., Physician's Choice 60 Billion" autoFocus style={{width:"100%",padding:"14px 16px",fontSize:18,borderRadius:12,border:`1.5px solid ${focused?"#7C6FE0":"var(--border-color)"}`,background:"var(--bg-primary)",color:"var(--text-primary)",outline:"none"}} />

            {suggestions.map((s,i) => { const mi=s.toLowerCase().indexOf(value.toLowerCase()); return <div key={s} onMouseDown={()=>select(s)} onMouseEnter={()=>setHl(i)} style={{padding:"10px 14px",fontSize:18,cursor:"pointer",background:i===hl?"rgba(124,111,224,0.08)":"transparent",color:"var(--text-primary)",textAlign:"left",borderBottom:i<suggestions.length-1?"1px solid var(--border-color)":"none"}}>{mi>=0?<>{s.slice(0,mi)}<strong style={{color:"#7C6FE0"}}>{s.slice(mi,mi+value.length)}</strong>{s.slice(mi+value.length)}</>:s}</div>; })}
          </div>}
        </div>

      </div>;
    }

      const [product1, setProduct1] = useState(null);
      const [strains1, setStrains1] = useState(null);
      const [product2, setProduct2] = useState(null);
      const [strains2, setStrains2] = useState(null);

      const handleProductSearch = async () => {
        if (!productQuery.trim()) return;
        // Check known products first (instant, no API call)
        const known = findKnownProduct(productQuery);
        if (known) {
          const c = classifyStrains(known.strains || []);
          if (compareMode && product1) {
            setProduct2(known); setStrains2(c); setProductData(null); setClassifiedStrains(null);
          } else {
            setProductData(known); setClassifiedStrains(c);
          }
          return;
        }
        setLoading(true); setError(""); setLoadingMsg("Searching for product details...");
        try { 
          const d = await lookupProduct(productQuery); 
          console.log("Product data:", d);
          setLoadingMsg("Classifying strains..."); 
          const strains = Array.isArray(d.strains) ? d.strains : [];
          const c = classifyStrains(strains); 
          if (compareMode && product1) {
            setProduct2(d); setStrains2(c); setProductData(null); setClassifiedStrains(null);
          } else {
            setProductData(d); setClassifiedStrains(c);
          }
        } catch(e) { 
          console.error("Search failed:", e); 
          setError("Couldn't find that product: " + e.message); 
        }
        setLoading(false);
      };

      const handlePhotoUpload = async e => {
        const file = e.target.files?.[0]; if (!file) return;
        setLoading(true); setError(""); setLoadingMsg("Reading your supplement label...");
        try {
          const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Read failed"));r.readAsDataURL(file);});
          const d = await analyzePhoto(b64, file.type||"image/jpeg");
          setLoadingMsg("Classifying strains...");
          const c = classifyStrains(d.strains||[]);
          const hasName = d.product_name && !d.product_name.toLowerCase().includes("unknown");
          if (hasName) { setProductData(d); setClassifiedStrains(c); } else { setPendingPhoto({data:d,classified:c}); setPhotoProductName(""); }
        } catch(e) { setError("Couldn't read that label. Try a clearer photo."); }
        setLoading(false); if(fileRef.current) fileRef.current.value="";
      };

      const confirmPhotoName = () => {
        if(!pendingPhoto) return;
        const name = photoProductName.trim()||"Uploaded Product";
        setProductData({...pendingPhoto.data, product_name:name, brand:pendingPhoto.data.brand?.toLowerCase().includes("unknown")?"":pendingPhoto.data.brand});
        setClassifiedStrains(pendingPhoto.classified); setPendingPhoto(null); setPhotoProductName("");
      };

      const startCompare = () => {
        // Save current product as product1, show search for product2
        setProduct1(productData);
        setStrains1(classifiedStrains);
        setProductData(null);
        setClassifiedStrains(null);
        setProductQuery("");
        setCompareMode(true);
      };

          </div>
          <h1 style={{fontSize:"clamp(28px,5.5vw,48px)",fontWeight:800,lineHeight:1.1,color:"var(--text-primary)",marginBottom:16}}>
            Is Your Probiotic{" "}<span style={{color:"#7C6FE0",whiteSpace:"nowrap"}}>Human Strain<span style={{fontSize:"0.5em",verticalAlign:"super"}}>™</span></span>?
          </h1>
          <p style={{fontSize:18,fontWeight:600,color:"var(--text-primary)",lineHeight:1.5,maxWidth:560,margin:"0 auto 8px"}}>
            Your body evolved to host specific bacteria.<br/>Most probiotics come from soil, dairy, or animals.
          </p>
          <p style={{fontSize:18,color:"var(--text-secondary)",lineHeight:1.6,maxWidth:520,margin:"0 auto"}}>Search any probiotic product to see what's really inside.</p>
        </div>

        {/* Hero Search */}
        {!productData && !pendingPhoto && !product2 && <>
          {compareMode && product1 && <div style={{background:"rgba(124,111,224,0.06)",border:"1px solid rgba(124,111,224,0.2)",borderRadius:12,padding:"16px 20px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div><span style={{fontSize:18,fontWeight:600,color:"#7C6FE0"}}>Comparing: {product1.product_name}</span><br/><span style={{fontSize:18,color:"var(--text-secondary)"}}>Now search for the second product below</span></div>
            <button onClick={reset} style={{background:"none",border:"1px solid var(--border-color)",borderRadius:8,padding:"6px 12px",fontSize:18,color:"var(--text-tertiary)",cursor:"pointer"}}>Cancel</button>
          </div>}
          <HeroSearch value={productQuery} onChange={setProductQuery} onSubmit={handleProductSearch} />
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"12px 0 0",marginBottom:40}}>
            <span style={{fontSize:18,color:"var(--text-tertiary)"}}>or</span>
            <button onClick={()=>fileRef.current?.click()} style={{background:"none",border:"none",color:"#7C6FE0",fontSize:18,fontWeight:600,cursor:"pointer",textDecoration:"underline",display:"flex",alignItems:"center",gap:5}}>📸 Upload your supplement label</button>
            <input ref={fileRef} type="file" accept="image/*" onChange={handlePhotoUpload} style={{display:"none"}} />
          </div>
        </>}

        {/* Loading */}
        {loading && <div style={{textAlign:"center",padding:"60px 20px",marginBottom:24,animation:"pulse 1.5s ease infinite"}}><div style={{fontSize:36,marginBottom:16}}>🧬</div><p style={{fontSize:18,fontWeight:600,color:"var(--text-primary)"}}>{loadingMsg}</p><p style={{fontSize:18,color:"var(--text-tertiary)",marginTop:6}}>This takes 10–20 seconds...</p></div>}

        {/* Error */}
        {error && <div style={{padding:"16px 20px",borderRadius:12,marginBottom:20,background:"rgba(224,85,85,0.08)",border:"1px solid rgba(224,85,85,0.2)",color:"#E05555",fontSize:18}}>{error}</div>}

        {/* Pending photo name */}
        {pendingPhoto && <div style={{animation:"fadeSlideIn 0.4s ease",marginBottom:32}}><div className="search-card" style={{background:"var(--bg-secondary)",border:"1px solid var(--border-color)",borderRadius:16,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:16}}>✅</div>
          <h3 style={{fontSize:18,fontWeight:700,color:"var(--text-primary)",marginBottom:6}}>Label scanned — {pendingPhoto.classified.length} strains found</h3>
          <p style={{fontSize:18,color:"var(--text-secondary)",marginBottom:20}}>What probiotic is this?</p>
          <ProductNameAutocomplete value={photoProductName} onChange={setPhotoProductName} onSubmit={confirmPhotoName} />

        </div></div>}

        {productData && classifiedStrains && !product2 && <div style={{marginBottom:40}}><AnalysisView productData={productData} classifiedStrains={classifiedStrains} onReset={reset} onCompare={startCompare} /></div>}

        {/* Comparison View — two products */}
        {product1 && strains1 && product2 && strains2 && <div style={{marginBottom:40}}><ComparisonView product1={product1} strains1={strains1} product2={product2} strains2={strains2} onReset={reset} /></div>}

        {!loading && !pendingPhoto && <div>

            <h2 style={{fontSize:18,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"var(--text-tertiary)",whiteSpace:"nowrap"}}>Browse All Strains</h2>
            <div style={{flex:1,height:1,background:"var(--border-color)"}}/>
          </div>
          <ManualSearch />
        </div>}

        <p style={{marginTop:48,fontSize:18,color:"var(--text-tertiary)",textAlign:"center",lineHeight:1.6}}>*These statements have not been evaluated by the Food and Drug Administration. This tool is for educational purposes only. Strain origin classifications are based on published isolation sources and may vary by specific strain designation.</p>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
